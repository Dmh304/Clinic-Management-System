
# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Database (SQL Server)
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ecms_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=0864213579
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT
# ============================================================
jwt.secret=change_this_to_a_secure_random_256bit_key_in_production
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# ============================================================
# Mail (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
