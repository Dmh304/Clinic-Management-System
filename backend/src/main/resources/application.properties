
# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# Database (SQL Server)
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ecms_db;encrypt=false
spring.datasource.username=sa
spring.datasource.password=123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
jwt.secret=ecms$2024!XkP9mQrL#vZ7nFwBsUjYhTdCgAoNiElRu5WqM8pJ3Hz
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# ============================================================
# Mail (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
google.oauth.client-id=your-google-client-id-on-cloud-console